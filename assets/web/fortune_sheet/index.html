<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FortuneSheet</title>
  <link rel="stylesheet" href="fortune-sheet/index.umd.min.css">
  <link rel="stylesheet" href="fortune_sheet.css">
</head>
<body>
  <div id="app">
    <div id="sheet-root"></div>
  </div>
  <script>
    (function () {
      var g = typeof globalThis !== 'undefined' ? globalThis : window;
      g.crypto = g.crypto || {};
      if (!g.crypto.randomFillSync && g.crypto.getRandomValues) {
        g.crypto.randomFillSync = function (buf) {
          return g.crypto.getRandomValues(buf);
        };
      }
    })();
  </script>
  <script>
    (function () {
      try {
        var g = typeof globalThis !== 'undefined' ? globalThis : window;
        if (!g || !g.console) return;
        // 디버그(호스트가 window.__fsDebugEnabled=true 주입)에서는 콘솔을 막지 않는다.
        if (g.__fsDebugEnabled) return;
        var noop = function () {};
        g.console.log = noop;
        g.console.debug = noop;
        g.console.info = noop;
        g.console.warn = noop;
        g.console.error = noop;
      } catch (_) {}
    })();
  </script>
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="fortune-sheet/index.umd.min.js"></script>
  <script src="bwip-js.min.js"></script>
  <script src="fortune_sheet.js"></script>
</body>
</html>
